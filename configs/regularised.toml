seed = 42
run_name = "regularised"
output_dir = "models"

[data]
train_csv = "data/cbis-ddsm/training/train.csv"
val_csv = "data/cbis-ddsm/training/val.csv"
test_csv = "data/cbis-ddsm/training/test.csv"
image_root = "data/cbis-ddsm/cbis_ddsm"
image_size = 224

[model]
name = "deeper"
pretrained = false
dropout_conv = 0.1
dropout_head = 0.4

[train]
epochs = 50
batch_size = 32
lr = 3e-4
weight_decay = 1e-4
grad_clip = 1.0
scheduler = "plateau"
early_stop_patience = 15
